name: AI Mockup Updates from Feedback

on:
  issues:
    types: [labeled]

jobs:
  apply-feedback:
    # Only run when the 'feedback' label is added
    if: github.event.label.name == 'feedback'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install openai

      - name: Apply feedback with GPT-4o
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: python .github/scripts/apply_feedback.py

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet index.html && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Create PR with AI changes
        if: steps.diff.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          BRANCH="ai-feedback/issue-${ISSUE_NUMBER}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add index.html
          git commit -m "AI: apply mockup feedback from #${ISSUE_NUMBER}"
          git push origin "$BRANCH"
          gh pr create \
            --title "AI mockup update from feedback #${ISSUE_NUMBER}" \
            --body "Closes #${ISSUE_NUMBER}

This PR was auto-generated by GPT-4o based on the annotations in issue #${ISSUE_NUMBER}.

**Review the diff before merging** — merge to deploy to GitHub Pages automatically." \
            --base main \
            --head "$BRANCH"

      - name: Comment on issue if no changes
        if: steps.diff.outputs.changed == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --body "🤖 AI reviewed this feedback but determined no HTML changes were needed, or the feedback was informational only."
